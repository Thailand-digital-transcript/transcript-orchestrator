eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

app:
  outbox:
    relay:
      enabled: true

keycloak:
  # The test JwtDecoder (TestJwtConfig) validates iss against this; jwks-uri is
  # unused in tests (the test decoder trusts a local keypair) but set for parity.
  issuer: http://localhost:8080/realms/transcript
  jwks-uri: http://localhost:8080/realms/transcript/protocol/openid-connect/certs
